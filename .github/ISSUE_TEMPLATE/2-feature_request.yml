name: Feature request
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before suggesting a feature, please search [existing issues](https://github.com/ladybug-me/caelestia-dots-kde/issues?q=is%3Aissue) to avoid duplicates.

        This repository is a **KDE Plasma port**. For Hyprland features, use [caelestia-dots/caelestia](https://github.com/caelestia-dots/caelestia).

        Please write in English.

  - type: textarea
    attributes:
      label: Proposal
      description: What would you like to add or change?
      placeholder: A widget, setting, workflow improvement, or other change.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Additional context
      description: Add links, screenshots, or references if they help explain the request.
      placeholder: Mockups, examples, or other notes.
