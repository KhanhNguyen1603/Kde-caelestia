name: Sync Version Files

on:
  workflow_dispatch:

jobs:
  sync-version-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load Version from Config
        run: |
          set -euo pipefail
          source .github/version.env

          if [[ -z "${VERSION:-}" ]]; then
            echo "VERSION is missing in .github/version.env"
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must match vX.Y.Z, got: $VERSION"
            exit 1
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Sync Runtime Version Files
        run: |
          set -euo pipefail

          sed -i -E '0,/set\(VERSION "v[0-9]+\.[0-9]+\.[0-9]+"\)/s//set(VERSION "'"$VERSION"'")/' shell/CMakeLists.txt

      - name: Commit Synced Files
        run: |
          set -euo pipefail

          if git diff --quiet -- shell/CMakeLists.txt; then
            echo "No version changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add shell/CMakeLists.txt
          git commit -m "chore: sync version files to $VERSION"
          git push origin HEAD:${GITHUB_REF_NAME}
