name: Version Release

on:
  push:
    branches:
      - main

jobs:
  version-release:
    runs-on: ubuntu-latest
    concurrency:
      group: version-release
      cancel-in-progress: true
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch main Branch
        run: |
          set -euo pipefail
          git fetch origin main:refs/remotes/origin/main --force

      - name: Load Version from Config
        run: |
          set -euo pipefail
          source .github/version.env

          if [[ -z "${VERSION:-}" ]]; then
            echo "VERSION is missing in .github/version.env"
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must match vX.Y.Z, got: $VERSION"
            exit 1
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Validate Version Sync (Release-Only)
        run: |
          set -euo pipefail

          CMAKE_VERSION=$(sed -nE 's/^[[:space:]]*set\(VERSION "([^"]+)"\).*/\1/p' shell/CMakeLists.txt | head -n 1)
          ABOUT_BINDING=$(grep -F 'text: CUtils.version ? `v${CUtils.version}` : "…"' shell/modules/nexus/pages/AboutPage.qml | head -n 1 || true)

          echo "Config VERSION: $VERSION"
          echo "CMake VERSION:  ${CMAKE_VERSION:-<missing>}"
          echo "About binding:  ${ABOUT_BINDING:-<missing>}"

          if [[ "${CMAKE_VERSION:-}" != "$VERSION" || -z "${ABOUT_BINDING:-}" ]]; then
            echo "Version drift detected. Update shell/CMakeLists.txt and ensure AboutPage reads CUtils.version before release."
            exit 1
          fi

      - name: Create or Update Version Tag
        run: |
          set -euo pipefail

          PREVIOUS_VERSION_TAG=$(git rev-parse -q --verify "refs/tags/$VERSION" || true)

          echo "PREVIOUS_VERSION_TAG=$PREVIOUS_VERSION_TAG" >> $GITHUB_ENV

          git tag -f "$VERSION" "$GITHUB_SHA"
          git push origin "refs/tags/$VERSION" --force

      - name: Create or Update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -n "$PREVIOUS_VERSION_TAG" ] && [ "$PREVIOUS_VERSION_TAG" != "$VERSION" ]; then
            git log "$PREVIOUS_VERSION_TAG..$GITHUB_SHA" --no-merges --invert-grep --grep='\[skip ci\]' --pretty='- %s (%h)' > commit_notes.txt
          else
            git log origin/main -n 15 --no-merges --invert-grep --grep='\[skip ci\]' --pretty='- %s (%h)' > commit_notes.txt
          fi

          {
            echo "### What's New in $VERSION"
            echo

            if [ -s commit_notes.txt ]; then
              cat commit_notes.txt
            else
              echo "- Maintenance release for $VERSION."
            fi

            echo
            echo "*May your desktop always reflect the stars.*"
          } > release_notes.md

          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release edit "$VERSION" \
              --title "Caelestia KDE $VERSION" \
              --notes-file release_notes.md \
              --prerelease=false \
              --latest
          else
            gh release create "$VERSION" \
              --title "Caelestia KDE $VERSION" \
              --notes-file release_notes.md \
              --prerelease=false \
              --latest
          fi