name: Rolling Release

on:
  push:
    branches:
      - main

jobs:
  rolling-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Version
        id: version
        run: |
          # Extract the version number (e.g. v2.0.0) from the README.md
          VERSION=$(grep -oP '(?<=<b>)[vV0-9.]+(?=</b>)' .github/README.md | head -n 1)
          if [ -z "$VERSION" ]; then
            VERSION="v2.0.1" # fallback
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Sync Version in Repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Update AboutPage.qml
          sed -i -E "s/text: \"v[0-9]+\.[0-9]+\.[0-9]+\"/text: \"${{ env.VERSION }}\"/g" shell/modules/nexus/pages/AboutPage.qml
          
          # Update CMakeLists.txt
          sed -i -E "s/set\(VERSION \"v[0-9]+\.[0-9]+\.[0-9]+\"\)/set(VERSION \"${{ env.VERSION }}\")/g" shell/CMakeLists.txt
          
          git add shell/modules/nexus/pages/AboutPage.qml shell/CMakeLists.txt
          git commit -m "chore: sync version to ${{ env.VERSION }} [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Update Rolling Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f rolling
          git push -f origin rolling

      - name: Create or Update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat << EOF > release_notes.md

          ### 🌠 What's New in ${{ env.VERSION }}

          - 🌙 **Bar**: MacOS-style app dock, Configurable Panel Position, Material workspace icons, DND toggle, and a live drag-and-drop components editor.
          - ☄️ **Launchers**: Emoji Picker, Clipboard History, Window Switcher, and Hyprland Keybinds.
          - 🌌 **Wallpapers**: GIF/video support with auto-pause, plus Wallhaven integration.
          - 🎵 **Bad Apple Easter Egg**: A custom shader effect that plays Bad Apple directly through the shell's UI material by masking the background and preserving the shell's native translucent blur and shadow effects.
          - 🔭 **Dashboard**: Developer console terminal tab with history and autocomplete.
          - 🪐 **Desktop**: Floating lyrics, Sound visualizer, Shimeji pets, dynamic wallpaper recoloring, and Bezel Mode.
          - 🧠 **Ai**: Added Ai assistant in notification panel with ollama support.
          - ⏩️ **Performance**: Added custom C++ backend plugins for a faster shell experience.
          - 🔄 **Updates**: Automatic updates through shell settings.

          *May your desktop always reflect the stars.*
          EOF

          gh release edit rolling \
            --title "🌌 Caelestia KDE ✨ Rolling Release" \
            --notes-file release_notes.md \
            --prerelease=false \
            --latest || \
          gh release create rolling \
            --title "🌌 Caelestia KDE ✨ Rolling Release" \
            --notes-file release_notes.md \
            --prerelease=false \
            --latest
