name: Rolling Release

on:
  push:
    branches:
      - dev

jobs:
  rolling-release:
    runs-on: ubuntu-latest
    concurrency:
      group: rolling-release
      cancel-in-progress: true
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch dev Branch
        run: |
          set -euo pipefail
          git fetch origin dev:refs/remotes/origin/dev --force

      - name: Load Version from Config
        run: |
          set -euo pipefail
          source .github/version.env

          if [[ -z "${VERSION:-}" ]]; then
            echo "VERSION is missing in .github/version.env"
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must match vX.Y.Z, got: $VERSION"
            exit 1
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Validate Version Sync (Release-Only)
        run: |
          set -euo pipefail

          CMAKE_VERSION=$(sed -nE 's/^[[:space:]]*set\(VERSION "([^"]+)"\).*/\1/p' shell/CMakeLists.txt | head -n 1)
          ABOUT_BINDING=$(grep -F 'text: CUtils.version ? `v${CUtils.version}` : "…"' shell/modules/nexus/pages/AboutPage.qml | head -n 1 || true)

          echo "Config VERSION: $VERSION"
          echo "CMake VERSION:  ${CMAKE_VERSION:-<missing>}"
          echo "About binding:  ${ABOUT_BINDING:-<missing>}"

          if [[ "${CMAKE_VERSION:-}" != "$VERSION" || -z "${ABOUT_BINDING:-}" ]]; then
            echo "Version drift detected. Update shell/CMakeLists.txt and ensure AboutPage reads CUtils.version before release."
            exit 1
          fi

      - name: Update Rolling Tag
        run: |
          set -euo pipefail

          PREVIOUS_ROLLING=$(git rev-parse -q --verify refs/tags/rolling || true)
          PREVIOUS_DEV_SYNC=$(git rev-parse -q --verify refs/tags/rolling-dev-sync || true)
          DEV_SYNC_POINT=$(git merge-base "$GITHUB_SHA" origin/dev)

          if [[ -z "${DEV_SYNC_POINT:-}" ]]; then
            echo "Unable to resolve a merge-base between main and origin/dev."
            exit 1
          fi

          echo "PREVIOUS_ROLLING=$PREVIOUS_ROLLING" >> $GITHUB_ENV
          echo "PREVIOUS_DEV_SYNC=$PREVIOUS_DEV_SYNC" >> $GITHUB_ENV
          echo "DEV_SYNC_POINT=$DEV_SYNC_POINT" >> $GITHUB_ENV

          git tag -f rolling "$GITHUB_SHA"
          git tag -f rolling-dev-sync "$DEV_SYNC_POINT"
          git push origin refs/tags/rolling --force
          git push origin refs/tags/rolling-dev-sync --force

      - name: Create or Update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -n "$PREVIOUS_DEV_SYNC" ] && [ "$PREVIOUS_DEV_SYNC" != "$DEV_SYNC_POINT" ]; then
            git log "$PREVIOUS_DEV_SYNC..$DEV_SYNC_POINT" --no-merges --invert-grep --grep='\[skip ci\]' --pretty='- %s (%h)' > commit_notes.txt
          else
            git log origin/dev -n 15 --no-merges --invert-grep --grep='\[skip ci\]' --pretty='- %s (%h)' > commit_notes.txt
          fi

          {
            echo "### What's New in $VERSION"
            echo

            if [ -s commit_notes.txt ]; then
              cat commit_notes.txt
            else
              echo "- Maintenance release for $VERSION."
            fi

            echo
            echo "*May your desktop always reflect the stars.*"
          } > release_notes.md

          if gh release view rolling >/dev/null 2>&1; then
            gh release edit rolling \
              --title "Caelestia KDE $VERSION" \
              --notes-file release_notes.md \
              --prerelease=false \
              --latest
          else
            gh release create rolling \
              --title "Caelestia KDE $VERSION" \
              --notes-file release_notes.md \
              --prerelease=false \
              --latest
          fi
