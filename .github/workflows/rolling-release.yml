name: Rolling Release

on:
  push:
    branches:
      - main

jobs:
  rolling-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Version
        id: version
        run: |
          # Extract the version number (e.g. v2.0.0) from the README.md
          VERSION=$(grep -oP '(?<=<b>)[vV0-9.]+(?=</b>)' .github/README.md | head -n 1)
          if [ -z "$VERSION" ]; then
            VERSION="v2.0.2" # fallback
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Sync Version in Repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Update AboutPage.qml
          sed -i -E "s/text: \"v[0-9]+\.[0-9]+\.[0-9]+\"/text: \"$VERSION\"/g" shell/modules/nexus/pages/AboutPage.qml
          
          # Update CMakeLists.txt
          sed -i -E "s/set\(VERSION \"v[0-9]+\.[0-9]+\.[0-9]+\"\)/set(VERSION \"$VERSION\")/g" shell/CMakeLists.txt

          # Update README dropdown
          sed -i -E "s/<b>  v[0-9]+\.[0-9]+\.[0-9]+ new features<\/b>/<b> $VERSION new features<\/b>/g" .github/README.md
          
          git add shell/modules/nexus/pages/AboutPage.qml shell/CMakeLists.txt .github/README.md
          git commit -m "chore: sync version to $VERSION [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Update Rolling Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          PREVIOUS_ROLLING=$(git rev-list -n 1 rolling 2>/dev/null || true)
          echo "PREVIOUS_ROLLING=$PREVIOUS_ROLLING" >> $GITHUB_ENV
          git tag -f rolling
          git push -f origin rolling

      - name: Create or Update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$PREVIOUS_ROLLING" ]; then
            git log "$PREVIOUS_ROLLING..HEAD" --no-merges --invert-grep --grep='\[skip ci\]' --pretty='- %s (%h)' > commit_notes.txt
          else
            git log -n 15 --no-merges --invert-grep --grep='\[skip ci\]' --pretty='- %s (%h)' > commit_notes.txt
          fi

          {
            echo "### What's New in $VERSION"
            echo

            if [ -s commit_notes.txt ]; then
              cat commit_notes.txt
            else
              echo "- Maintenance release for $VERSION."
            fi

            echo
            echo "*May your desktop always reflect the stars.*"
          } > release_notes.md

          gh release edit rolling \
            --title "Caelestia KDE - Rolling Release" \
            --notes-file release_notes.md \
            --prerelease=false \
            --latest || \
          gh release create rolling \
            --title "Caelestia KDE - Rolling Release" \
            --notes-file release_notes.md \
            --prerelease=false \
            --latest
